<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Gallery | ZenSmile Dental Clinic Colaba</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-tooth" style="color: var(--primary-teal); font-size: 1.8rem;"></i>
                <span class="logo-text">ZenSmile</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="gallery.html">Smile Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="contact.html" class="btn btn-primary">Book Now</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="heading-lg">Smile Transformations</h1>
            <p>Real results from real patients at ZenSmile Dental Clinic.</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="gallery-grid">
                <div class="gallery-item rounded-card">
                    <img src="zensmile_smiling_man_1773650698401.png" alt="Smile Transformation">
                    <div class="gallery-overlay">
                        <span>Full Smile Design</span>
                    </div>
                </div>
                <div class="gallery-item rounded-card">
                    <img src="zensmile_hero_clinic_1773650674306.png" alt="Clinic Interior">
                    <div class="gallery-overlay">
                        <span>Our Platinum Suite</span>
                    </div>
                </div>
                <div class="gallery-item rounded-card">
                    <img src="zensmile_dentist_work_1773650717336.png" alt="Doctor at Work">
                    <div class="gallery-overlay">
                        <span>Precision Care</span>
                    </div>
                </div>
                <div class="gallery-item rounded-card">
                    <img src="zensmile_pediatric_dentistry_1773651093815.png" alt="Pediatric Care">
                    <div class="gallery-overlay">
                        <span>Kids Dentistry</span>
                    </div>
                </div>
                <div class="gallery-item rounded-card">
                    <img src="zensmile_braces_aligners_1773651110495.png" alt="Orthodontics">
                    <div class="gallery-overlay">
                        <span>Clear Aligners</span>
                    </div>
                </div>
                <div class="gallery-item rounded-card">
                    <img src="zensmile_modern_tech_1773651126969.png" alt="Modern Tech">
                    <div class="gallery-overlay">
                        <span>Advanced Diagnostics</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 ZenSmile Dental Clinic.</p>
            </div>
        </div>
    </footer>

    <!-- Chatbot Script Integration -->
    <script src="zenbot.js"></script>
</body>
</html>
